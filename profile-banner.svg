<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">Erni Tabash banner</title>
  <desc id="desc">Dark technical banner for a GitHub profile with blue accents and system geometry.</desc>
  <defs>
